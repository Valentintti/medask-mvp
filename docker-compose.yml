services:
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.local
      target: server
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8787
    ports:
      - "8787:8787"

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.local
      target: frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:80"
